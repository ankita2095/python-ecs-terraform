name: Deploy to AWS using Terraform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 258335483014.dkr.ecr.us-east-1.amazonaws.com

      # 4️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t python-app .

      # 5️⃣ Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag python-app:latest 258335483014.dkr.ecr.us-east-1.amazonaws.com/python-app:latest

      # 6️⃣ Push to ECR
      - name: Push Docker Image
        run: |
          docker push 258335483014.dkr.ecr.us-east-1.amazonaws.com/python-app:latest

      # 7️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 8️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init
        working-directory: terraform-ecs

      # 9️⃣ Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform-ecs